    link:"FBI documents name Dershowitz as the connective tissue between Mossad, Epstein, and DOJ. If accurate, he is the most important single figure in understanding how Epstein's intelligence protection functioned in the United States."

// Secondary links between non-center nodes
const secondaryLinks = [
  { source:"maxwell_g", target:"maxwell_r" },
  { source:"barak",     target:"koren"     },
  { source:"barak",     target:"shlomo"    },
  { source:"maxwell_g", target:"dershowitz"},
  { source:"dershowitz",target:"acosta"    },
  { source:"koren",     target:"panetta"   },
  { source:"burns",     target:"panetta"   },
];

// ── BUILD GRAPH ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
function drawGrid() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = 'rgba(0,255,180,0.035)'; ctx.lineWidth = 1;
  const sz = 52;
  for(let x=0;x<canvas.width;x+=sz){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for(let y=0;y<canvas.height;y+=sz){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
}
drawGrid();
window.addEventListener('resize', () => { drawGrid(); });

const W = window.innerWidth, H = window.innerHeight;
const svgEl = d3.select('#graph').attr('width', W).attr('height', H);

// Zoom behaviour
const zoomBehavior = d3.zoom()
  .scaleExtent([0.2, 4])
  .on('zoom', (event) => {
    container.attr('transform', event.transform);
  });
svgEl.call(zoomBehavior);

// Single container for zoom/pan
const container = svgEl.append('g');

// Defs
const defs = svgEl.append('defs');
Object.entries(colorMap).forEach(([k,c]) => {
  const f = defs.append('filter').attr('id', `glow-${k}`);
  f.append('feGaussianBlur').attr('stdDeviation','4.5').attr('result','blur');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

// Build links array
const primaryLinks = nodes.filter(n=>n.id!=='epstein').map(n=>({
  source:'epstein', target:n.id, secondary:false
}));
const allLinks = [
  ...primaryLinks,
  ...secondaryLinks.map(l=>({...l, secondary:true}))
];

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(allLinks).id(d=>d.id)
    .distance(d=>d.secondary?90:230)
    .strength(d=>d.secondary?0.2:0.55))
  .force('charge', d3.forceManyBody().strength(-700))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide(d=>d.r+38));

const ep = nodes.find(n=>n.id==='epstein');
ep.fx = W/2; ep.fy = H/2;

// Links
const linkG = container.append('g');
const linkEl = linkG.selectAll('line').data(allLinks).enter().append('line')
  .style('stroke', d=>d.secondary?'rgba(255,255,255,0.07)':'rgba(0,255,180,0.14)')
  .style('stroke-dasharray', d=>d.secondary?'4,6':'none')
  .style('stroke-width', d=>d.secondary?0.8:1.2);

// Nodes
const nodeG = container.append('g');
const nodeEl = nodeG.selectAll('g.node').data(nodes).enter().append('g')
  .attr('class','node');

// Pulse on center
nodeEl.filter(d=>d.id==='epstein').append('circle')
  .attr('class','pulse-ring').attr('r',28);

// Circles
nodeEl.append('circle')
  .attr('r', d=>d.r)
  .attr('fill', d=>colorMap[d.type]||'#888')
  .attr('fill-opacity', (_,i)=>i===0?0.28:0.17)
  .attr('stroke', d=>colorMap[d.type]||'#888')
  .attr('stroke-width', d=>d.id==='epstein'?3:2)
  .attr('filter', d=>`url(#glow-${d.type})`);

// Labels
nodeEl.each(function(d) {
  const g = d3.select(this);
  const lines = d.label.split('\n');
  lines.forEach((line,i) => {
    g.append('text')
      .attr('text-anchor','middle')
      .attr('dy', d.r + 13 + i*14)
      .style('font-size', d.id==='epstein'?'12px':'10px')
      .style('font-family',"'Share Tech Mono', monospace")
      .style('fill', d.id==='epstein'?'#ffffff':'rgba(200,255,232,0.6)')
      .style('letter-spacing','0.07em')
      .style('font-weight', d.id==='epstein'?'bold':'normal')
      .text(line);
  });
});

// Tooltip elements
const tooltip    = document.getElementById('tooltip');
const ttName     = document.getElementById('tt-name');
const ttAgency   = document.getElementById('tt-agency');
const ttStatus   = document.getElementById('tt-status');
const ttDesc     = document.getElementById('tt-desc');
const ttEvidence = document.getElementById('tt-evidence');

// Panel elements
const panelOverlay = document.getElementById('panel-overlay');
const pName     = document.getElementById('p-name');
const pRole     = document.getElementById('p-role');
const pAgency   = document.getElementById('p-agency');
const pStatus   = document.getElementById('p-status');
const pDesc     = document.getElementById('p-desc');
const pEvidence = document.getElementById('p-evidence');
const pLink     = document.getElementById('p-link');

function closePanel() {
  panelOverlay.classList.remove('open');
}

function openPanel(d) {
  const col = colorMap[d.type] || '#888';
  const sc  = statusColors[d.status] || col;
  pName.textContent    = d.label.replace('\n',' ');
  pRole.textContent    = d.role;
  pAgency.textContent  = d.agency;
  pAgency.style.color  = col;
  pStatus.textContent  = d.status;
  pStatus.style.color       = sc;
  pStatus.style.background  = sc + '18';
  pStatus.style.borderColor = sc + '55';
  pDesc.textContent     = d.desc;
  pEvidence.textContent = d.evidence;
  pLink.textContent     = d.link;
  panelOverlay.classList.add('open');
}

// Track drag vs click
let dragMoved = false;

nodeEl
  .on('mouseover', function(event, d) {
    const col = colorMap[d.type] || '#888';
    const sc  = statusColors[d.status] || col;
    ttName.textContent   = d.label.replace('\n',' ');
    ttAgency.textContent = d.agency;
    ttAgency.style.color = col;
    ttStatus.textContent = d.status;
    ttStatus.style.color       = sc;
    ttStatus.style.background  = sc + '22';
    ttStatus.style.border      = `1px solid ${sc}55`;
    ttDesc.textContent     = d.intelRole;
    ttEvidence.textContent = '▸ ' + d.epsteinLink + '\n▸ ' + d.significance;
    tooltip.style.display = 'block';

    linkEl
      .style('stroke', l => {
        const s = typeof l.source==='object'?l.source.id:l.source;
        const t = typeof l.target==='object'?l.target.id:l.target;
        return (s===d.id||t===d.id)?'rgba(0,255,180,0.8)':(l.secondary?'rgba(255,255,255,0.03)':'rgba(0,255,180,0.06)');
      })
      .style('stroke-width', l => {
        const s = typeof l.source==='object'?l.source.id:l.source;
        const t = typeof l.target==='object'?l.target.id:l.target;
        return (s===d.id||t===d.id)?2.5:(l.secondary?0.5:0.9);
      });

    nodeEl.select('circle').attr('fill-opacity', n => {
      if(n.id===d.id) return 0.5;
      if(n.id==='epstein') return 0.28;
      const connected = allLinks.some(l=>{
        const s = typeof l.source==='object'?l.source.id:l.source;
        const t = typeof l.target==='object'?l.target.id:l.target;
        return (s===d.id&&t===n.id)||(t===d.id&&s===n.id);
      });
      return connected?0.32:0.05;
    });
  })
  .on('mousemove', function(event) {
    tooltip.style.left = Math.min(event.clientX+18, W-320)+'px';
    tooltip.style.top  = Math.max(event.clientY-20, 10)+'px';
  })
  .on('mouseout', function() {
    tooltip.style.display = 'none';
    linkEl
      .style('stroke', d=>d.secondary?'rgba(255,255,255,0.07)':'rgba(0,255,180,0.14)')
      .style('stroke-width', d=>d.secondary?0.8:1.2);
    nodeEl.select('circle').attr('fill-opacity',(_,i)=>i===0?0.28:0.17);
  })
  .on('mousedown', () => { dragMoved = false; })
  .on('click', function(event, d) {
    if(dragMoved) return;
    event.stopPropagation();
    tooltip.style.display = 'none';
    openPanel(d);
  });

// Mark drag as moved
nodeEl.call(
  d3.drag()
    .on('start',(e,d)=>{ dragMoved=false; if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (e,d)=>{ dragMoved=true; if(d.id!=='epstein'){ d.fx=e.x; d.fy=e.y; } })
    .on('end',  (e,d)=>{ if(!e.active) simulation.alphaTarget(0); if(d.id!=='epstein'){ d.fx=null; d.fy=null; } })
);

// Close panel on Escape
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

// Stats
const byType = {};
nodes.filter(n=>n.id!=='epstein').forEach(n=>{ byType[n.type]=(byType[n.type]||0)+1; });
document.getElementById('stats').innerHTML =
  `NODES: ${nodes.length-1}<br>`+
  `US INTEL: ${byType.us||0}<br>`+
  `ISRAELI: ${byType.israel||0}<br>`+
  `RUSSIAN: ${byType.russia||0}<br>`+
  `MULTI: ${byType.both||0}<br>`+
  `ALLEGED: ${byType.alleged||0}`;

// Filter
function filterNodes(btn, type) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  nodeEl.style('opacity', d=>d.id==='epstein'?1:(type==='all'?1:(d.type===type?1:0.08)));
  linkEl.style('opacity', l=>{
    if(type==='all') return 1;
    const sn = typeof l.source==='object'?l.source:nodes.find(n=>n.id===l.source);
    const tn = typeof l.target==='object'?l.target:nodes.find(n=>n.id===l.target);
    return (sn&&sn.type===type)||(tn&&tn.type===type)?1:0.03;
  });
}

// Zoom buttons
function doZoom(factor) {
  if(factor === 0) {
    svgEl.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity.translate(0,0).scale(1));
  } else {
    svgEl.transition().duration(280).call(zoomBehavior.scaleBy, factor);
  }
}

// Tick
simulation.on('tick', ()=>{
  linkEl
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeEl.attr('transform',d=>`translate(${d.x},${d.y})`);
});
</script>
</body>
</html>
