const primaryLinks = nodes.filter(n=>n.id!=='epstein').map(n=>({source:'epstein',target:n.id,secondary:false}));
const allLinks = [...primaryLinks,...secondaryLinks];

const canvas=document.getElementById('grid');
const ctx=canvas.getContext('2d');
function drawGrid(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,229,255,0.025)';ctx.lineWidth=1;
  const sz=48;
  for(let x=0;x<canvas.width;x+=sz){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
  for(let y=0;y<canvas.height;y+=sz){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
}
drawGrid();
window.addEventListener('resize',drawGrid);

const W=window.innerWidth,H=window.innerHeight;
const svgEl=d3.select('#graph').attr('width',W).attr('height',H);
const zoomBehavior=d3.zoom().scaleExtent([0.15,4]).on('zoom',e=>container.attr('transform',e.transform));
svgEl.call(zoomBehavior);
const container=svgEl.append('g');

const defs=svgEl.append('defs');
Object.entries(colorMap).forEach(([k,c])=>{
  const f=defs.append('filter').attr('id','glow-'+k);
  f.append('feGaussianBlur').attr('stdDeviation','4.5').attr('result','blur');
  const m=f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

const simulation=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(allLinks).id(d=>d.id).distance(d=>d.secondary?80:230).strength(d=>d.secondary?0.15:0.5))
  .force('charge',d3.forceManyBody().strength(-750))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collision',d3.forceCollide(d=>d.r+32))
  .force('radial',d3.forceRadial(d=>d.id==='epstein'?0:280,W/2,H/2).strength(d=>d.id==='epstein'?0:0.35));

nodes.find(n=>n.id==='epstein').fx=W/2;
nodes.find(n=>n.id==='epstein').fy=H/2;

nodeEl.filter(d=>d.id==='epstein').append('circle').attr('class','pulse-ring').attr('r',28);

nodeEl.each(function(d){

    ttNetworth.textContent=d.networth?'NET WORTH: '+d.networth:'';
    tooltip.style.display='block';
    linkEl.style('stroke',l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return (s===d.id||t===d.id)?(d.id==='epstein'?'rgba(255,32,96,0.3)':colorMap[d.type]):(l.secondary?'rgba(255,255,255,0.03)':'rgba(0,229,255,0.04)');
    }).style('stroke-width',l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return (s===d.id||t===d.id)?(d.id==='epstein'?1.2:2.5):(l.secondary?0.4:0.7);
    });
    nodeEl.select('circle').attr('fill-opacity',n=>{
      if(n.id===d.id) return 0.5;
      if(n.id==='epstein') return 0.25;
      const connected=allLinks.some(l=>{
        const s=typeof l.source==='object'?l.source.id:l.source;
        const t=typeof l.target==='object'?l.target.id:l.target;
        return (s===d.id&&t===n.id)||(t===d.id&&s===n.id);
      });
      return connected?0.32:0.04;
    });
  })
  .on('mousemove',function(event){
    tooltip.style.left=Math.min(event.clientX+18,W-320)+'px';
    tooltip.style.top=Math.max(event.clientY-20,10)+'px';
  })
  .on('mouseout',function(){
    tooltip.style.display='none';
    linkEl.style('stroke',d=>d.secondary?'rgba(255,255,255,0.05)':'rgba(0,229,255,0.09)').style('stroke-width',d=>d.secondary?0.6:1);
    nodeEl.select('circle').attr('fill-opacity',(_,i)=>i===0?0.25:0.13);
  })
  .on('mousedown',()=>{dragMoved=false;})
  .on('click',function(event,d){
    if(dragMoved)return;
    event.stopPropagation();
    tooltip.style.display='none';
    openPanel(d);
  });

nodeEl.call(d3.drag()
  .on('start',(e,d)=>{dragMoved=false;if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
  .on('drag',(e,d)=>{dragMoved=true;if(d.id!=='epstein'){d.fx=e.x;d.fy=e.y;}})
  .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);if(d.id!=='epstein'){d.fx=null;d.fy=null;}})
);

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

const byType={};
nodes.filter(n=>n.id!=='epstein').forEach(n=>{byType[n.type]=(byType[n.type]||0)+1;});
document.getElementById('stats').innerHTML=
  'TOTAL: '+(nodes.length-1)+'<br>'+
  'CONVICTED: '+(byType.convicted||0)+'<br>'+
  'NAMED IN FILES: '+(byType.suspicious||0)+'<br>'+
  'UNCLEAR: '+(byType.unclear||0);

function filterNodes(btn,type){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  nodeEl.style('opacity',d=>d.id==='epstein'?1:(type==='all'?1:(d.type===type?1:0.06)));
  linkEl.style('opacity',l=>{
    if(type==='all')return 1;
    const sn=typeof l.source==='object'?l.source:nodes.find(n=>n.id===l.source);
    const tn=typeof l.target==='object'?l.target:nodes.find(n=>n.id===l.target);
    return (sn&&sn.type===type)||(tn&&tn.type===type)?1:0.02;
  });
}

function doZoom(factor){
  if(factor===0)svgEl.transition().duration(400).call(zoomBehavior.transform,d3.zoomIdentity);
  else svgEl.transition().duration(280).call(zoomBehavior.scaleBy,factor);
}

simulation.on('tick',()=>{
  linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeEl.attr('transform',d=>'translate('+d.x+','+d.y+')');
});
</script>
</body>
</html>
